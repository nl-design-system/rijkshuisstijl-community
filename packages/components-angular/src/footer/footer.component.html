<footer class="rhc-page-footer-container" [attr.aria-labelledby]="heading ? headingId : null">
  @if (preFooter) {
    <div class="rhc-page-prefooter">
      @if (preFooterMessage) {
        <span class="rhc-page-prefooter__content">{{ preFooterMessage }}</span>
      }
    </div>
  }

  <div class="utrecht-page-footer rhc-page-footer">
    <div class="utrecht-page-footer__content">
      @if (heading) {
        <h2 class="rhc-page-footer__heading" [id]="headingId">{{ heading }}</h2>
      }
      <div class="rhc-page-footer-layout">
        @if (tagline) {
          <p class="rhc-page-footer__tagline">{{ tagline }}</p>
        }
        <rhc-column-layout>
          <ng-content select="[columns]"></ng-content>
        </rhc-column-layout>
      </div>
    </div>
  </div>

  @if (subFooter) {
    <div class="utrecht-page-footer rhc-page-footer rhc-page-footer--subfooter">
      <div class="utrecht-page-footer__content">
        <div class="rhc-page-subfooter-layout">
          <ng-content select="[subFooter]"></ng-content>
        </div>
      </div>
    </div>
  }
</footer>
